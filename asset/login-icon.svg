<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf7f0"/>
      <stop offset="100%" stop-color="#efeadf"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d7a5c"/>
      <stop offset="100%" stop-color="#2f5f47"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a98552"/>
      <stop offset="100%" stop-color="#8a6a3a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- macOS squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#paper)"/>
  <rect x="2" y="2" width="1020" height="1020" rx="226" ry="226" fill="none" stroke="#e5dfd0" stroke-width="3"/>

  <!-- Top label -->
  <text x="512" y="208" text-anchor="middle"
        font-family="'Newsreader','Iowan Old Style',Georgia,serif"
        font-size="62" font-style="italic" font-weight="500"
        fill="#5a5a58" letter-spacing="6">GitHub Login</text>
  <line x1="288" y1="244" x2="736" y2="244" stroke="#d4ccb8" stroke-width="3"/>

  <!-- ===== Center: Octocat-style circle + key going through it ===== -->
  <g transform="translate(512 552)" filter="url(#softShadow)">

    <!-- big forest-green ring (GitHub circular badge) -->
    <circle cx="0" cy="0" r="200" fill="url(#forest)"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#2f5f47" stroke-width="6"/>

    <!-- Inner monogram: stylized GH check-mark / arrow indicating "in" -->
    <!-- Right-pointing arrow representing 'login / enter' -->
    <g stroke="#f6f3ec" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- horizontal shaft -->
      <line x1="-90" y1="0" x2="80" y2="0"/>
      <!-- arrow head -->
      <polyline points="20,-60 80,0 20,60"/>
    </g>
  </g>

  <!-- Brass key crossing diagonally behind the circle for "auth/login" feel -->
  <g transform="translate(512 552) rotate(-32)" filter="url(#softShadow)">
    <!-- key shaft -->
    <rect x="120" y="-22" width="280" height="44" rx="10" fill="url(#brass)"/>
    <!-- key teeth -->
    <rect x="320" y="22" width="22" height="36" fill="url(#brass)"/>
    <rect x="360" y="22" width="22" height="50" fill="url(#brass)"/>
    <!-- key bow (the round handle) -->
    <circle cx="84" cy="0" r="60" fill="url(#brass)"/>
    <circle cx="84" cy="0" r="22" fill="url(#paper)"/>
  </g>

  <!-- Bottom pill: AUTH -->
  <rect x="382" y="876" width="260" height="64" rx="32" fill="#3d7a5c"/>
  <text x="512" y="920" text-anchor="middle"
        font-family="'Pretendard',-apple-system,system-ui,sans-serif"
        font-size="34" font-weight="800"
        fill="#f6f3ec" letter-spacing="10">AUTH</text>
</svg>
