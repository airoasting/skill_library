<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark outer background: radial warm vignette -->
    <radialGradient id="outerBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2e1508"/>
      <stop offset="100%" style="stop-color:#0e0704"/>
    </radialGradient>

    <!-- Card: terracotta gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c45e30"/>
      <stop offset="60%" style="stop-color:#b04f25"/>
      <stop offset="100%" style="stop-color:#9a4220"/>
    </linearGradient>

    <!-- Card inner glow -->
    <radialGradient id="cardGlow" cx="30%" cy="20%" r="65%">
      <stop offset="0%" style="stop-color:#e07040;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>

    <!-- Drop shadow for card -->
    <filter id="cardShadow" x="-8%" y="-10%" width="116%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Clip for card -->
    <clipPath id="cardClip">
      <rect x="80" y="70" width="1040" height="490" rx="36"/>
    </clipPath>
  </defs>

  <!-- Outer background -->
  <rect width="1200" height="630" fill="url(#outerBg)"/>

  <!-- Card -->
  <rect x="80" y="70" width="1040" height="490" rx="36" fill="url(#cardBg)" filter="url(#cardShadow)"/>

  <!-- Card inner glow overlay -->
  <rect x="80" y="70" width="1040" height="490" rx="36" fill="url(#cardGlow)" clip-path="url(#cardClip)"/>

  <!-- Subtle noise texture lines -->
  <line x1="80" y1="280" x2="1120" y2="280" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="80" y1="320" x2="1120" y2="320" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="80" y1="360" x2="1120" y2="360" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Brand label -->
  <text
    x="600" y="200"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="600"
    fill="#ffffff"
    opacity="0.65"
    text-anchor="middle"
    letter-spacing="6"
  >AI ROASTING</text>

  <!-- Main title -->
  <text
    x="600" y="318"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif"
    font-size="82"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-2"
  >비즈니스 리더를 위해</text>
  <text
    x="600" y="410"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif"
    font-size="82"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-2"
  >엄선한 AI 스킬</text>

  <!-- Subtitle -->
  <text
    x="600" y="470"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#ffffff"
    opacity="0.72"
    text-anchor="middle"
    letter-spacing="0"
  >검증된 실무 스킬만 선별합니다 · 매주 토요일 업데이트</text>

  <!-- Anthropic-style "A\" watermark bottom-right -->
  <g transform="translate(1000, 400)" opacity="0.12">
    <text
      font-family="'Helvetica Neue', Arial, sans-serif"
      font-size="148"
      font-weight="900"
      fill="#ffffff"
      letter-spacing="-8"
    >A\</text>
  </g>

  <!-- Skill count badge top-left area of card -->
  <rect x="130" y="118" width="110" height="38" rx="19" fill="#ffffff" opacity="0.15"/>
  <text x="185" y="143" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">79+ SKILLS</text>
</svg>
