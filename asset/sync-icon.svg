<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf7f0"/>
      <stop offset="100%" stop-color="#efeadf"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d7a5c"/>
      <stop offset="100%" stop-color="#2f5f47"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- macOS squircle background (warm paper) -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#paper)"/>
  <rect x="2" y="2" width="1020" height="1020" rx="226" ry="226" fill="none" stroke="#e5dfd0" stroke-width="3"/>

  <!-- Top label: serif italic, mimics homepage hero -->
  <text x="512" y="208" text-anchor="middle"
        font-family="'Newsreader','Iowan Old Style',Georgia,serif"
        font-size="62" font-style="italic" font-weight="500"
        fill="#5a5a58" letter-spacing="6">Skill Library</text>
  <line x1="324" y1="244" x2="700" y2="244" stroke="#d4ccb8" stroke-width="3"/>

  <!-- ===== Center medallion: STAR + circular SYNC arrows ===== -->
  <g transform="translate(512 552)">

    <!-- circular sync arrows in coffee brown (#8a6a3a) -->
    <!-- two semi-circular arcs each with an arrowhead -->
    <g fill="none" stroke="#8a6a3a" stroke-width="22" stroke-linecap="round">
      <!-- top-right arc going clockwise: from (-300,-90) sweeping over the top to (300,-90) -->
      <path d="M -300 -90 A 314 314 0 0 1 300 -90"/>
      <!-- bottom-left arc going clockwise: from (300,90) sweeping under the bottom to (-300,90) -->
      <path d="M 300 90 A 314 314 0 0 1 -300 90"/>
    </g>

    <!-- arrowhead solids at each arc tip, oriented to flow direction (clockwise) -->
    <g fill="#8a6a3a">
      <!-- arrow at end of top arc — at (300, -90), pointing down-right (tangent of clockwise arc) -->
      <polygon points="0,-34 60,0 0,34" transform="translate(300 -90) rotate(72)"/>
      <!-- arrow at end of bottom arc — at (-300, 90), pointing up-left -->
      <polygon points="0,-34 60,0 0,34" transform="translate(-300 90) rotate(252)"/>
    </g>

    <!-- big star in forest green -->
    <g filter="url(#softShadow)">
      <path d="M 0 -228 L 60 -72 L 226 -56 L 102 52 L 138 218 L 0 130 L -138 218 L -102 52 L -226 -56 L -60 -72 Z"
            fill="url(#forest)"
            stroke="#2f5f47" stroke-width="6" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Bottom pill: SYNC -->
  <rect x="382" y="876" width="260" height="64" rx="32" fill="#3d7a5c"/>
  <text x="512" y="920" text-anchor="middle"
        font-family="'Pretendard',-apple-system,system-ui,sans-serif"
        font-size="34" font-weight="800"
        fill="#f6f3ec" letter-spacing="10">SYNC</text>
</svg>
